<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Simulator</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #070b14;
        --surface: #0d1526;
        --surface2: #111d35;
        --border: rgba(0,200,255,0.12);
        --border-bright: rgba(0,200,255,0.4);
        --cyan: #00c8ff;
        --cyan-dim: rgba(0,200,255,0.15);
        --green: #00ffb0;
        --red: #ff4060;
        --text: #c8deff;
        --text-dim: #4a6080;
        --mono: 'Share Tech Mono', monospace;
        --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: var(--sans);
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        color: var(--text);
    }
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
        pointer-events: none;
        z-index: 999;
    }
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: rgba(0,100,200,0.08); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(0,200,150,0.06); bottom: -100px; right: -100px; }
    .shell { position: relative; z-index: 10; width: 420px; display: flex; flex-direction: column; }
    .status-bar {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        letter-spacing: 0.05em;
    }
    .status-dot {
        display: inline-block; width: 6px; height: 6px; border-radius: 50%;
        background: var(--green); margin-right: 6px;
        box-shadow: 0 0 6px var(--green);
        animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 36px 32px 28px;
        position: relative;
    }
    .bracket { position: absolute; width: 12px; height: 12px; border-color: var(--cyan); border-style: solid; opacity: 0.5; }
    .bracket.tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .bracket.tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .bracket.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
    .bracket.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-ring {
        width: 64px; height: 64px; border-radius: 50%;
        border: 1px solid var(--border-bright);
        background: var(--cyan-dim);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 16px;
        position: relative; overflow: hidden;
        box-shadow: 0 0 24px rgba(0,200,255,0.2);
    }
    .logo-ring::after {
        content: ''; position: absolute; inset: 0;
        background: conic-gradient(transparent 270deg, var(--cyan) 360deg);
        animation: spin 4s linear infinite; opacity: 0.4;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .logo-inner {
        position: absolute; inset: 4px; border-radius: 50%;
        background: var(--surface2);
        display: flex; align-items: center; justify-content: center;
        z-index: 1; font-family: var(--mono); font-size: 18px;
        color: var(--cyan); text-shadow: 0 0 12px rgba(0,200,255,0.6);
    }
    .logo-area h1 { font-family: var(--mono); font-size: 16px; font-weight: 400; color: var(--cyan); letter-spacing: 0.1em; text-shadow: 0 0 12px rgba(0,200,255,0.4); margin-bottom: 4px; }
    .logo-area p { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 6px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-prefix { position: absolute; left: 12px; font-family: var(--mono); font-size: 12px; color: var(--cyan); opacity: 0.5; pointer-events: none; }
    .field input {
        width: 100%; background: var(--bg); border: 1px solid var(--border);
        border-radius: 4px; padding: 10px 14px 10px 32px;
        color: var(--text); font-family: var(--mono); font-size: 12px;
        outline: none; transition: border-color 0.2s, box-shadow 0.2s; caret-color: var(--cyan);
    }
    .field input::placeholder { color: var(--text-dim); }
    .field input:focus { border-color: var(--border-bright); box-shadow: 0 0 0 2px rgba(0,200,255,0.08); }
    .submit-btn {
        width: 100%; margin-top: 8px; padding: 12px;
        font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em;
        background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,200,255,0.05));
        border: 1px solid var(--border-bright); color: var(--cyan);
        border-radius: 4px; cursor: pointer; transition: all 0.2s;
        text-shadow: 0 0 8px rgba(0,200,255,0.4);
    }
    .submit-btn:hover { background: rgba(0,200,255,0.2); box-shadow: 0 0 20px rgba(0,200,255,0.2); }
    .submit-btn:active { transform: scale(0.99); }
    .error-msg { font-family: var(--mono); font-size: 10px; color: var(--red); text-align: center; margin-top: 12px; min-height: 14px; letter-spacing: 0.06em; display: none; }
    .divider { height: 1px; background: var(--border); margin: 20px 0 16px; }
    .auth-note { font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-align: center; letter-spacing: 0.06em; line-height: 1.8; }
    .auth-note span { color: var(--cyan); opacity: 0.6; }
    .sys-bar {
        font-family: var(--mono); font-size: 9px; color: var(--text-dim);
        display: flex; justify-content: space-between;
        padding: 5px 14px;
        background: var(--surface); border: 1px solid var(--border);
        border-top: none; border-radius: 0 0 8px 8px; letter-spacing: 0.05em;
    }
    #clock { color: var(--cyan); }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="shell">
    <div class="status-bar">
        <span><span class="status-dot"></span>SYSTEM IS ONLINE</span>
    </div>
    <div class="panel">
        <div class="bracket tl"></div><div class="bracket tr"></div>
        <div class="bracket bl"></div><div class="bracket br"></div>
        <div class="logo-area">
            <img src="https://www.royalholloway.ac.uk/images/logoRoyalHolloway2x.png"
                 alt="Royal Holloway, University of London"
                 style="height: 36px; width: auto; margin-bottom: 14px;">
            <div class="logo-ring"><div class="logo-inner">PT</div></div>
            <h1>PATIENT SIMULATOR</h1>
            <p>CLINICAL TRAINING TOOL</p>
        </div>
        <div class="field">
            <label>USERNAME</label>
            <div class="input-wrap">
                <span class="input-prefix">&gt;_</span>
                <input type="text" id="username" placeholder="Enter username..." autocomplete="off">
            </div>
        </div>
        <div class="field">
            <label>PASSWORD</label>
            <div class="input-wrap">
                <span class="input-prefix">&gt;_</span>
                <input type="password" id="password" placeholder="Enter password..." onkeydown="handleEnter(event)">
            </div>
        </div>
        <button class="submit-btn" onclick="login()">LOGIN</button>
        <div class="error-msg" id="errorMsg">⚠ INVALID CREDENTIALS</div>
        <div class="divider"></div>
        <div class="auth-note">
            <span>ACCESS RESTRICTED</span> TO AUTHORIZED PERSONNEL ONLY<br>
            ALL SESSIONS ARE MONITORED AND RECORDED. IF YOU HAVE ANY QUESTIONS OR QUERIES PLEASE EMAIL <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="58080b010c1d1b1017081d0a190c1117160b180a100d1476191b760d13">[email&#160;protected]</a>
        </div>
    </div>
    <div class="sys-bar">
        <span>PRODUCT OF DCLIN RHUL</span>
        <span id="clock"></span>
    </div>
</div>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toISOString().replace("T", " ").substring(0, 19) + " UTC";
}
updateClock();
setInterval(updateClock, 1000);

function handleEnter(e) { if (e.key === "Enter") login(); }

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.style.display = "none";

    if (!username || !password) {
        errorMsg.textContent = "⚠ FIELDS CANNOT BE EMPTY";
        errorMsg.style.display = "block";
        return;
    }

    try {
        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("password", password);

        const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData.toString()
        });

        if (!response.ok) {
            errorMsg.textContent = "⚠ INVALID CREDENTIALS";
            errorMsg.style.display = "block";
            return;
        }

        const data = await response.json();
        localStorage.setItem("token", data.access_token);

        // Ask the server who we are, then redirect by role
        const meRes = await fetch("/me", {
            headers: { "Authorization": "Bearer " + data.access_token }
        });
        const me = await meRes.json();

        if (me.role === "administrator") {
            window.location.href = "/admin-page";
        } else if (me.role === "staff") {
            window.location.href = "/supervisor-page";
        } else {
            window.location.href = "/disclaimer-page";
        }

    } catch (err) {
        errorMsg.textContent = "⚠ TOOL DOWN";
        errorMsg.style.display = "block";
        console.error(err);
    }
}
</script>
</body>
</html>
